# Overrides for Docker Compose — MySQL service is reachable via hostname "mysql"
spring.datasource.url=jdbc:mysql://mysql:3306/vaultify_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:vaultify}
spring.datasource.password=${MYSQL_PASSWORD:vaultify_pass}

vaultify.jwt.secret=${JWT_SECRET:vaultify-docker-secret-replace-in-production}
vaultify.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
