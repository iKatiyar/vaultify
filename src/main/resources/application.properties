# Server
server.port=8080

# Datasource — override with env vars or application-docker.properties in containers
spring.datasource.url=jdbc:mysql://localhost:3306/vaultify_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=secret

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
vaultify.jwt.secret=vaultify-super-secret-key-change-this-in-production-must-be-at-least-256-bits
vaultify.jwt.expiration-ms=86400000

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.vaultify=INFO
