version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: vaultify-mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: vaultify_db
      MYSQL_USER: vaultify
      MYSQL_PASSWORD: vaultify_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vaultify-app
    ports:
      - "8080:8080"
    environment:
      MYSQL_USER: vaultify
      MYSQL_PASSWORD: vaultify_pass
      JWT_SECRET: vaultify-docker-secret-replace-in-production
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
